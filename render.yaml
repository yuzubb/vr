services:
  - type: web
    name: vrm-facetrack
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: NEXT_PUBLIC_CAPTURE_INTERVAL_MS
        value: "30000"
      - key: NEXT_PUBLIC_VRM_MODEL_URL
        value: "/models/avatar.vrm"
